name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"
  repository_dispatch:
    types: [upstream-update]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Add upstream remote
        run: |
          git remote get-url upstream >/dev/null 2>&1 || git remote add upstream https://github.com/Panniantong/agent-reach.git

      - name: Fetch upstream
        run: |
          git fetch upstream main

      - name: Check for upstream updates
        id: check
        run: |
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "already_up_to_date=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MERGE_BASE=$(git merge-base HEAD upstream/main || true)
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          echo "already_up_to_date=false" >> "$GITHUB_OUTPUT"
          echo "merge_base=${MERGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "upstream_short=${UPSTREAM_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build sync report
        if: steps.check.outputs.already_up_to_date == 'false'
        run: |
          python3 scripts/build_sync_report.py \
            --base "${{ steps.check.outputs.merge_base }}" \
            --upstream upstream/main > /tmp/sync-report.md

      - name: Merge upstream into working tree
        if: steps.check.outputs.already_up_to_date == 'false'
        run: |
          git merge --allow-unrelated-histories --no-commit --no-ff upstream/main 2>/dev/null || {
            echo "Conflicts detected, resolving with fork policy..."

            git diff --name-only --diff-filter=U | while read -r file; do
              echo "Processing: $file"
              case "$file" in
                .gitignore|.github/workflows/sync-upstream.yml|.github/workflows/validate-sync.yml|scripts/sync-upstream.sh|scripts/validate_sync.py|scripts/build_sync_report.py)
                  git checkout --ours "$file"
                  git add "$file"
                  ;;
                README.md|CHANGELOG.md|CONTRIBUTING.md|docs/*.md|agent_reach/guides/*.md|agent_reach/skill/SKILL.md|TRANSLATION_STATUS.md)
                  git checkout --ours "$file"
                  git add "$file"
                  ;;
                *.py|pyproject.toml|constraints.txt|tests/*.py|scripts/*.sh)
                  git checkout --theirs "$file"
                  git add "$file"
                  ;;
                *)
                  echo "Manual resolution required for $file"
                  ;;
              esac
            done

            if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
              echo "Unresolved conflicts remain."
              exit 1
            fi
          }

      - name: Run sync validation
        id: validate
        if: steps.check.outputs.already_up_to_date == 'false'
        continue-on-error: true
        env:
          EXPECTED_REPO_SLUG: ${{ github.repository }}
        run: |
          python3 scripts/validate_sync.py > /tmp/sync-validation.log 2>&1

      - name: Commit sync merge
        if: steps.check.outputs.already_up_to_date == 'false'
        run: |
          git status --short
          git commit --no-edit

      - name: Push sync branch
        if: steps.check.outputs.already_up_to_date == 'false'
        run: |
          git switch -C codex/upstream-sync
          git push --force-with-lease origin HEAD:codex/upstream-sync

      - name: Prepare pull request body
        if: steps.check.outputs.already_up_to_date == 'false'
        run: |
          cat /tmp/sync-report.md > /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "### Validation" >> /tmp/pr-body.md
          if [ "${{ steps.validate.outcome }}" = "success" ]; then
            echo "- Status: passed" >> /tmp/pr-body.md
          else
            echo "- Status: failed" >> /tmp/pr-body.md
            echo "" >> /tmp/pr-body.md
            echo '```text' >> /tmp/pr-body.md
            sed -n '1,160p' /tmp/sync-validation.log >> /tmp/pr-body.md
            echo '```' >> /tmp/pr-body.md
          fi

      - name: Create or update pull request
        if: steps.check.outputs.already_up_to_date == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="chore: sync upstream/main (${{ steps.check.outputs.upstream_short }})"
          PR_NUMBER=$(gh pr list --head codex/upstream-sync --base main --json number --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body-file /tmp/pr-body.md
          else
            gh pr create --base main --head codex/upstream-sync --title "$TITLE" --body-file /tmp/pr-body.md
          fi

      - name: Fail if validation failed
        if: steps.check.outputs.already_up_to_date == 'false' && steps.validate.outcome != 'success'
        run: |
          echo "Sync validation failed. Review the PR for details."
          cat /tmp/sync-validation.log
          exit 1
